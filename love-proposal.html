<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>เซอร์ไพรส์เพื่อเธอ 💖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#fff0f5;-webkit-tap-highlight-color:transparent;user-select:none;}


/* ═══ SCREEN 1: LOADING ═══ */
#s-load{background:linear-gradient(155deg,#ffe8f2 0%,#ffd1e6 40%,#ffaec8 100%);}
.load-box{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.6rem;padding:2rem 2rem;}
.load-icon{font-size:4.8rem;animation:hbeat 1.1s ease-in-out infinite;}
@keyframes hbeat{0%,100%{transform:scale(1);}45%{transform:scale(1.22);}65%{transform:scale(0.95);}}
.load-title{font-size:1.5rem;font-weight:800;color:#c2185b;line-height:1.5;letter-spacing:0.01em;}
.load-sub{font-size:0.92rem;color:#e91e8c;opacity:0.8;}
.prog-wrap{width:min(300px,78vw);height:12px;background:rgba(255,255,255,0.55);border-radius:99px;overflow:hidden;box-shadow:0 2px 12px rgba(255,100,150,0.2);}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff85a1,#ff4d6d);border-radius:99px;transition:width 0.35s ease;position:relative;overflow:hidden;}
.prog-bar::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:rgba(255,255,255,0.38);animation:shim 1s linear infinite;}
@keyframes shim{to{left:220%;}}
.prog-num{font-size:0.9rem;color:#ff4d6d;font-weight:700;margin-top:-0.5rem;}
.face-wrap{
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 20px 0;
}

.face-img{
  width: 180px;      /* ปรับขนาดได้ */
  max-width: 60vw;   /* ไม่ใหญ่เกินบนมือถือ */
  height: auto;
  display: block;
  object-fit: contain;

  /* เพิ่มความน่ารัก */
  filter: drop-shadow(0 8px 15px rgba(0,0,0,0.15));
  animation: float 3s ease-in-out infinite;
}

/* ลอยขึ้นลงเบา ๆ */
@keyframes float{
  0%,100%{
    transform: translateY(0);
  }
  50%{
    transform: translateY(-10px);
  }
}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.7s ease;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}

/* FLOATING HEARTS */
.hearts-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.hf{position:absolute;bottom:-80px;opacity:0;animation:floatUp linear infinite;}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0.7) rotate(-12deg);opacity:0;}
  8%{opacity:0.75;}
  92%{opacity:0.4;}
  100%{transform:translateY(-115vh) scale(1.3) rotate(15deg);opacity:0;}
}
/* ═══ SCREEN 2: PROPOSAL ═══ */
#s-prop{background:linear-gradient(155deg,#fff8fb 0%,#ffe8f2 100%);}
.prop-box{position:relative;z-index:1;text-align:center;padding:1.5rem 1.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;width:100%;max-width:400px;}

.face-wrap{width:180px;height:180px;position:relative;flex-shrink:0;}
.face{position:absolute;inset:0;width:100%;height:100%;transition:opacity 0.35s ease;}

.prop-title{font-size:clamp(2rem,8vw,2.6rem);font-weight:900;color:#ff4d6d;line-height:1.25;text-shadow:0 3px 16px rgba(255,80,120,0.15);}
.prop-sub{font-size:1rem;color:#e91e8c;font-weight:500;min-height:1.5em;transition:all 0.35s ease;}

/* YES button */
.btn-yes{display:block;border:none;border-radius:99px;font-size:1.1rem;font-weight:800;padding:0.9rem 2.8rem;background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;box-shadow:0 8px 28px rgba(67,160,71,0.4);cursor:pointer;letter-spacing:0.04em;transition:transform 0.2s,box-shadow 0.2s,font-size 0.5s,padding 0.5s;will-change:transform;}
.btn-yes:active{transform:scale(0.95);}
@keyframes bonce{0%,100%{transform:scale(1);}30%{transform:scale(1.14);}65%{transform:scale(0.95);}}
.btn-yes.pop{animation:bonce 0.45s ease;}

/* NO button */
.no-zone{position:relative;width:100%;height:60px;display:flex;align-items:center;justify-content:center;}
.btn-no{border:none;border-radius:99px;font-size:1rem;font-weight:800;padding:0.85rem 2.5rem;background:linear-gradient(135deg,#ef5350,#c62828);color:#fff;box-shadow:0 6px 22px rgba(239,83,80,0.38);cursor:pointer;letter-spacing:0.04em;transition:opacity 0.3s,transform 0.3s;}

/* ═══ SCREEN 3: ACCEPTED ═══ */
#s-ok{background:linear-gradient(155deg,#ffe0ec 0%,#ffc2d4 100%);overflow:hidden;}
.ok-box{position:relative;z-index:2;text-align:center;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.6rem;}
.ok-icon{font-size:5.5rem;animation:popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{0%{transform:scale(0) rotate(-25deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
.ok-title{font-size:clamp(1.7rem,7vw,2.4rem);font-weight:900;color:#c2185b;line-height:1.4;}
.ok-sub{font-size:1rem;color:#e91e8c;font-weight:500;opacity:0.85;}
#confetti{position:absolute;inset:0;pointer-events:none;z-index:1;}

/* ═══ SCREEN 4: VIDEO ═══ */
#s-vid{background:#1a0010;}
.vid-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#5c0030 0%,#1a0010 70%);z-index:0;}
.vid-box{position:relative;z-index:1;width:100%;max-width:420px;padding:1.5rem 1rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}
.vid-label{font-size:0.9rem;color:#ffb3cc;font-weight:600;text-align:center;letter-spacing:0.04em;}
.vid-frame{width:100%;border-radius:20px;overflow:hidden;box-shadow:0 12px 55px rgba(255,80,130,0.5);background:#000;aspect-ratio:9/16;max-height:60vh;display:flex;align-items:stretch;}
.vid-frame iframe{width:100%;height:100%;border:none;}
.btn-replay{background:linear-gradient(135deg,#ff85a1,#ff4d6d);color:#fff;border:none;border-radius:99px;font-size:1rem;font-weight:800;padding:0.85rem 2.4rem;cursor:pointer;box-shadow:0 6px 24px rgba(255,80,130,0.4);letter-spacing:0.04em;transition:transform 0.2s;}
.btn-replay:active{transform:scale(0.95);}
</style>
</head>
<body>

<div class="hearts-bg" id="hbg"></div>

<!-- ── SCREEN 1: LOADING ── -->
<div class="screen active" id="s-load">
  <div class="load-box">
    <div class="load-icon">💖</div>
    <div>
      <div class="load-title">กำลังเตรียมเซอร์ไพรส์<br>ให้เธอ ❤️</div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-num" id="pnum">0%</div>
    <div class="load-sub">รอแป๊บนึงนะ 🌸</div>
  </div>
</div>

<!-- ── SCREEN 2: PROPOSAL ── -->
<div class="screen" id="s-prop">
  <div class="prop-box">

    <!-- Face: state 0 = happy, 1 = sad/pleading, 2 = wink, 3 = shy -->
    <div class="face-wrap">
 <img id="f0" class="face-img" src="Happy1.png">
<img id="f1" class="face-img" src="Sad1.png" style="display:none">
<img id="f2" class="face-img" src="Sad2.png" style="display:none">
<img id="f3" class="face-img" src="Happy2.png" style="display:none">
</div>

    <div class="prop-title">เป็นแฟนกันนะ ❤️</div>
    <div class="propimg-sub" id="psub">เค้าอยากดูแลเธอไปนาน ๆ</div>

    <button class="btn-yes" id="byes" onclick="doYes()">ตกลง 💖</button>

    <div class="no-zone" id="nzone">
      <button class="btn-no" id="bno" onclick="doNo()">ปฏิเสธ 😢</button>
    </div>
  </div>
</div>

<!-- ── SCREEN 3: ACCEPTED ── -->
<div class="screen" id="s-ok">
  <canvas id="confetti"></canvas>
  <div class="ok-box">
    <div class="ok-icon">❤️</div>
    <div class="ok-title">เย้~ จากนี้เราเป็น<br>แฟนกันแล้วนะ ❤️</div>
    <div class="ok-sub">ขอบคุณที่เลือกเค้า 🌸</div>
  </div>
</div>

<!-- ── SCREEN 4: VIDEO ── -->
<div class="screen" id="s-vid">
  <div class="vid-glow"></div>
  <div class="vid-box">
    <div class="vid-label">วิดีโอนี้ตั้งใจทำเพื่อที่รักคนเดียว ❤️</div>
    <div class="vid-frame">
      <iframe
        src="https://drive.google.com/file/d/1rQyh3ppKfWhXRkKJBKYzsJ-zy8wYzKM1/preview"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <button class="btn-replay" onclick="reloadVid()">▶ เล่นซ้ำ</button>
  </div>
</div>

<script>
// ── Floating hearts ──
(function(){
  const c=document.getElementById('hbg');
  const em=['💕','💗','💖','💓','💞','🌸','✨'];
  for(let i=0;i<22;i++){
    const h=document.createElement('span');
    h.className='hf';
    h.textContent=em[Math.floor(Math.random()*em.length)];
    h.style.cssText=`left:${Math.random()*100}vw;font-size:${0.8+Math.random()*1.3}rem;animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*9}s;`;
    c.appendChild(h);
  }
})();

// ── Screen switcher ──
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Loading ──
(function(){
  const bar=document.getElementById('pbar');
  const num=document.getElementById('pnum');
  [[28,280],[52,580],[74,920],[90,1400],[100,2100]].forEach(([t,d])=>{
    setTimeout(()=>{
      bar.style.width=t+'%';num.textContent=t+'%';
      if(t===100)setTimeout(()=>go('s-prop'),650);
    },d);
  });
})();

// ── Proposal ──
let rejects=0;
const msgs=['เค้าอยากดูแลเธอไปนาน ๆ','แน่ใจแล้วหรอ 🥺','ลองคิดดูอีกทีน้า ❤️','เค้าเลือกให้แล้วน้าอิอิ 😘'];
const faces=['f0','f1','f2','f3'];

function setFace(n){
  faces.forEach((id,i)=>document.getElementById(id).style.display=i===n?'block':'none');
}

function doNo(){
  rejects=Math.min(rejects+1,3);
  document.getElementById('psub').textContent=msgs[rejects];
  setFace(rejects);
  const byes=document.getElementById('byes');
  const bno=document.getElementById('bno');
  const s=[1,1.22,1.48,1.8][rejects];
  byes.style.transform=`scale(${s})`;
  byes.classList.remove('pop');
  void byes.offsetWidth;
  byes.classList.add('pop');
  if(rejects<3){
    const W=window.innerWidth,H=window.innerHeight;
    const bw=180,bh=54;
    bno.style.cssText=`position:fixed;left:${10+Math.random()*(W-bw-20)}px;top:${10+Math.random()*(H-bh-20)}px;z-index:9999;border:none;border-radius:99px;font-size:1rem;font-weight:800;padding:0.85rem 2.5rem;background:linear-gradient(135deg,#ef5350,#c62828);color:#fff;box-shadow:0 6px 22px rgba(239,83,80,0.38);cursor:pointer;`;
    bno.onclick=doNo;
    burst(10);
  } else {
    bno.style.opacity='0';
    bno.style.transform='scale(0)';
    bno.style.pointerEvents='none';
    bno.style.transition='all 0.4s ease';
  }
}

function burst(n){
  const c=document.getElementById('hbg');
  const em=['💕','💖','💗','💓','❤️','🌸'];
  for(let i=0;i<n;i++){
    const h=document.createElement('span');
    h.className='hf';
    h.textContent=em[Math.floor(Math.random()*em.length)];
    h.style.cssText=`left:${Math.random()*100}vw;font-size:${1.1+Math.random()*1.6}rem;animation-duration:${4+Math.random()*4}s;animation-delay:${Math.random()*1.2}s;`;
    c.appendChild(h);
    setTimeout(()=>h.remove(),8500);
  }
}

// ── Yes ──
function doYes(){
  go('s-ok');
  launchConfetti();
  burst(25);
  playChime();
  setTimeout(()=>go('s-vid'),3800);
}

// ── Confetti ──
function launchConfetti(){
  const cv=document.getElementById('confetti');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#ff4d6d','#ff85a1','#ffb3cc','#ffd6e7','#ff69b4','#ffe066','#b5ead7','#fff'];
  const ps=[];
  for(let i=0;i<170;i++)ps.push({
    x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,
    w:5+Math.random()*9,h:4+Math.random()*6,
    color:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-0.5)*3.2,vy:1.8+Math.random()*3,
    rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.14
  });
  let fr,t=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      if(p.y>cv.height){p.y=-10;p.x=Math.random()*cv.width;}
    });
    t+=16;
    if(t<3600)fr=requestAnimationFrame(draw);
    else cancelAnimationFrame(fr);
  })();
}

function playChime(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.type='sine';o.frequency.value=f;
      const t=a.currentTime+i*0.14;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.17,t+0.05);
      g.gain.linearRampToValueAtTime(0,t+0.32);
      o.start(t);o.stop(t+0.36);
    });
  }catch(e){}
}

// ── Reload video (reload iframe) ──
function reloadVid(){
  const f=document.querySelector('#s-vid iframe');
  const src=f.src;f.src='';f.src=src;
}
</script>
</body>
</html>
